name: CI/CD Pipeline (Expo) - Fast

on:
  push:
    branches:
      - main
      - staging
      - develop
  pull_request:
    branches:
      - main
      - staging
      - develop

jobs:
  build:
    name: Build & Validate
    runs-on: ubuntu-latest
    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
      EAS_BUILD_NO_EXPO_GO_WARNING: ${{ secrets.EAS_BUILD_NO_EXPO_GO_WARNING }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: Cache Node & Expo
        uses: actions/cache@v3
        with:
          path: |
            ~/.npm
            ~/.expo
            node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install dependencies
        run: npm ci

      - name: Install EAS CLI
        run: npm install -g eas-cli

      - name: Run tests
        run: npm test

      - name: Cache EAS Build Artifacts
        uses: actions/cache@v3
        with:
          path: .eas/build
          key: ${{ runner.os }}-eas-build-${{ hashFiles('.eas.json') }}
          restore-keys: |
            ${{ runner.os }}-eas-build-

      - name: EAS Build Android
        run: eas build --platform android --non-interactive --profile production
