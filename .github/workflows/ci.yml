name: CI/CD Pipeline (Expo + EAS)

on:
  push:
    branches:
      - main
      - staging
      - develop
  pull_request:
    branches:
      - main
      - staging
      - develop

jobs:
  build:
    name: Build & Validate with EAS
    runs-on: ubuntu-latest
    steps:
      # Pega o código
      - uses: actions/checkout@v3

      # Configura Node.js
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20

      # Instala dependências
      - name: Install dependencies
        run: npm install

      # Instala o EAS CLI
      - name: Install EAS CLI
        run: npm install -g eas-cli

      # Roda os testes (opcional)
      - name: Run tests
        run: npm test

      # Build com EAS
      - name: EAS Build
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: eas build --platform all --non-interactive
