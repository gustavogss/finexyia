name: CI/CD Pipeline (Expo Android)

on:
  push:
    branches:
      - main
      - staging
      - develop
  pull_request:
    branches:
      - main
      - staging
      - develop

jobs:
  build-android:
    name: Build & Validate Android
    runs-on: ubuntu-latest
    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
      EAS_BUILD_NO_EXPO_GO_WARNING: true # remove warning do Expo Go

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install -g eas-cli

      - name: Install project packages
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build Android (EAS)
        run: eas build --platform android --non-interactive --profile production
