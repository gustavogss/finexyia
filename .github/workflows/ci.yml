name: CI/CD Pipeline (Expo + EAS)

on:
  push:
    branches:
      - main
      - staging
      - develop
  pull_request:
    branches:
      - main
      - staging
      - develop

jobs:
  build:
    name: Build & Validate with EAS
    runs-on: ubuntu-latest
    steps:
      # 1️⃣ Pega o código
      - uses: actions/checkout@v3

      # 2️⃣ Configura Node.js
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20

      # 3️⃣ Instala dependências
      - name: Install dependencies
        run: npm install

      # 4️⃣ Instala o EAS CLI
      - name: Install EAS CLI
        run: npm install -g eas-cli

      # 5️⃣ Roda os testes (opcional)
      - name: Run tests
        run: npm test

      # 6️⃣ Build com EAS
      - name: EAS Build
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          EAS_BUILD_NO_EXPO_GO_WARNING: true
          EXPO_PUBLIC_FIREBASE_API_KEY: ${{ secrets.EXPO_PUBLIC_FIREBASE_API_KEY }}
          API_SECRET_KEY: ${{ secrets.API_SECRET_KEY }}
        run: eas build --platform all --non-interactive
