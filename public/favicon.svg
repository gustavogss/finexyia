<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <!-- Background with gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#964900;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f57c00;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Rounded background -->
  <rect width="256" height="256" rx="56" fill="url(#bgGradient)"/>
  
  <!-- Trending Up Arrow Chart Icon -->
  <g transform="translate(128, 128)">
    <!-- Base line (horizontal) -->
    <line x1="-50" y1="30" x2="50" y2="30" stroke="white" stroke-width="6" stroke-linecap="round"/>
    
    <!-- Vertical axis -->
    <line x1="-50" y1="30" x2="-50" y2="-40" stroke="white" stroke-width="5" stroke-linecap="round" opacity="0.6"/>
    
    <!-- Chart line (trending up) -->
    <polyline points="-45,15 -20,-5 0,5 25,-20 50,-40" stroke="white" stroke-width="6" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    
    <!-- Arrow head at top right -->
    <g>
      <!-- Arrow line going up-right -->
      <line x1="45" y1="-35" x2="55" y2="-45" stroke="white" stroke-width="6" stroke-linecap="round"/>
      <!-- Arrow point -->
      <polyline points="50,-50 55,-45 60,-48" stroke="white" stroke-width="5" fill="white" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
    
    <!-- Data points on line -->
    <circle cx="-45" cy="15" r="4" fill="rgba(255,255,255,0.9)"/>
    <circle cx="-20" cy="-5" r="4" fill="rgba(255,255,255,0.9)"/>
    <circle cx="0" cy="5" r="4" fill="rgba(255,255,255,0.9)"/>
    <circle cx="25" cy="-20" r="4" fill="rgba(255,255,255,0.9)"/>
    <circle cx="50" cy="-40" r="5" fill="rgba(255,255,255,1)"/>
  </g>
</svg>
